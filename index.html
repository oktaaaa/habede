<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@400;700;900&display=swap');

    #book-scene {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2.5rem 1rem 2rem;
        min-height: 500px;
        background: #f0e8d8;
        border-radius: 16px;
        position: relative;
        overflow: hidden;
    }

    #book-scene::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse at 50% 0%, #e4d4b8 0%, transparent 65%);
        pointer-events: none;
    }

    .book-container {
        perspective: 1500px;
        width: 340px;
        height: 380px;
        position: relative;
    }

    .book {
        width: 340px;
        height: 380px;
        position: relative;
        transform-style: preserve-3d;
    }

    .page {
        position: absolute;
        top: 0;
        left: 170px;
        width: 170px;
        height: 380px;
        transform-origin: left center;
        transform-style: preserve-3d;
        transition: transform 0.78s cubic-bezier(0.645, 0.045, 0.355, 1);
        cursor: pointer;
    }

    .page .front,
    .page .back {
        position: absolute;
        inset: 0;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        border-radius: 0 8px 8px 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 22px 16px;
        box-sizing: border-box;
        box-shadow: 5px 0 18px rgba(80, 40, 10, 0.15);
    }

    .page .back {
        transform: rotateY(180deg);
        border-radius: 8px 0 0 8px;
        box-shadow: -5px 0 18px rgba(80, 40, 10, 0.15);
    }

    .page.flipped {
        transform: rotateY(-180deg);
    }

    .left-cover {
        position: absolute;
        top: 0;
        left: 0;
        width: 170px;
        height: 380px;
        border-radius: 8px 0 0 8px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 22px 16px;
        box-sizing: border-box;
        box-shadow: -3px 0 12px rgba(80, 40, 10, 0.1);
    }

    .spine {
        position: absolute;
        top: 0;
        left: 164px;
        width: 12px;
        height: 380px;
        z-index: 10;
        border-radius: 2px;
        box-shadow: 0 0 8px rgba(80, 40, 10, 0.25);
    }

    .page-title {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        font-size: 1.15rem;
        text-align: center;
        line-height: 1.35;
        margin: 0 0 10px;
    }

    .page-body {
        font-family: 'Nunito', sans-serif;
        font-size: 0.82rem;
        text-align: center;
        line-height: 1.7;
        margin: 0;
        font-weight: 700;
    }

    .page-italic {
        font-family: 'Playfair Display', serif;
        font-style: italic;
        font-size: 0.8rem;
        text-align: center;
        line-height: 1.65;
        margin: 0;
    }

    .big-emoji {
        font-size: 2.4rem;
        margin-bottom: 10px;
        line-height: 1;
    }

    .page-number {
        position: absolute;
        bottom: 10px;
        font-family: 'Nunito', sans-serif;
        font-size: 10px;
        opacity: 0.35;
        letter-spacing: 1px;
    }

    .controls {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-top: 1.6rem;
        z-index: 5;
        position: relative;
    }

    .ctrl-btn {
        background: #f5efe4;
        border: 1.5px solid #c4a882;
        border-radius: 50%;
        width: 42px;
        height: 42px;
        font-size: 1.1rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s, transform 0.15s;
        color: #6b4226;
        box-shadow: 0 2px 8px rgba(80, 40, 10, 0.12);
    }

    .ctrl-btn:hover {
        background: #e8d5b7;
        transform: scale(1.08);
    }

    .ctrl-btn:active {
        transform: scale(0.95);
    }

    .ctrl-btn:disabled {
        opacity: 0.3;
        cursor: default;
        transform: none;
    }

    .page-indicator {
        font-family: 'Nunito', sans-serif;
        font-size: 0.82rem;
        color: #8a6545;
        min-width: 80px;
        text-align: center;
        letter-spacing: 0.5px;
        font-weight: 700;
    }

    .tag {
        display: inline-block;
        background: rgba(255, 255, 255, 0.25);
        border-radius: 20px;
        padding: 3px 10px;
        font-family: 'Nunito', sans-serif;
        font-size: 0.7rem;
        font-weight: 900;
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 8px;
    }

    .divider {
        width: 40px;
        height: 1.5px;
        border-radius: 2px;
        margin: 10px auto;
        opacity: 0.4;
    }
</style>

<div id="book-scene">
    <div class="book-container">
        <div class="book" id="book">
            <div class="spine" id="spine"></div>
            <div class="left-cover" id="leftPanel"></div>
            <div class="page" id="page0" style="z-index:5">
                <div class="front" id="p0f"></div>
                <div class="back" id="p0b"></div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="prevBtn" disabled>&#8592;</button>
        <div class="page-indicator" id="pageIndicator">Cover</div>
        <button class="ctrl-btn" id="nextBtn">&#8594;</button>
    </div>
</div>

<script>
    (function () {
        const TC = '#c4683a'; // terracotta
        const TC2 = '#a8522a';
        const BR = '#6b4226'; // brown
        const BR2 = '#4a2e1a'; // dark brown
        const OL = '#7a6a3a'; // olive
        const OL2 = '#5a4e28';
        const SA = '#c9a87a'; // sand
        const CR = '#f5efe4'; // cream
        const CR2 = '#ede0cc';
        const MU = '#8b7355'; // muted
        const GR = '#6b7a3a'; // green-olive

        const spreads = [{
                left: {
                    bg: BR2,
                    spine: '#2e1c0c',
                    html: `<div class="page-italic" style="color:#d4b896;font-size:0.78rem;">jalan-jalan ke rumah bude<br>kak chaza, happy birthday KWKKWKWK</div>`
                },
                right: {
                    bg: TC,
                    html: `
          <div class="big-emoji">🎂</div>
          <img src="/birthday-cards/img1.jpeg" style="width:100px;height:100px;object-fit:cover;border-radius:10%;margin-bottom:10px;border:3px solid rgba(255,255,255,0.4);">
          <div class="divider" style="background:#fff3e8;width:50px;"></div>
          <div class="page-title" style="color:#fff;font-size:1.5rem;margin:0;">Kak Chaza!</div>
        `
                }
            },
            {
                left: {
                    bg: CR2,
                    html: `
          <div class="tag" style="background:#c4683a22;color:#8a4a28;">doa #1</div>
          <div class="big-emoji">💸</div>
          <div class="page-title" style="color:${BR};">Semoga kayo<br>melintir!</div>
          <div class="divider" style="background:${SA};"></div>
          <div class="page-italic" style="color:${MU};">biar kau pacak jajani kami WKKWKWK</div>
          <div class="page-number" style="left:14px;color:${MU};">1</div>
        `
                },
                right: {
                    bg: CR,
                    html: `
          <div class="page-italic" style="color:${OL};font-size:0.88rem;">"Biar kito pacak jajan di Nakula teros wkkwkwkwkwkw"</div>
          <div class="divider" style="background:${SA};"></div>
          
        `
                }
            },
            {
                left: {
                    bg: '#e8d8c0',
                    html: `
          <div class="tag" style="background:#6b422622;color:${BR};">doa #2</div>
          <div class="big-emoji">🚫</div>
          <div class="page-title" style="color:${TC2};font-size:1rem;">Semoga dak ketemu<br>samo cowok yang<br>toxic lagi!</div>
          <div class="divider" style="background:${SA};"></div>
          <div class="page-italic" style="color:${MU};">wkwkwkwk 😂</div>
          <div class="page-number" style="left:14px;color:${MU};">3</div>
        `
                },
                right: {
                    bg: CR2,
                    html: `
          <div class="page-italic" style="color:${BR};font-size:0.82rem;">Jangan kau agoki teros lanang-lanang bendera merah itu oi</div>
          <div class="divider" style="background:${SA};"></div>
        `
                }
            },
            {
                left: {
                    bg: OL2,
                    html: `
          <div class="tag" style="background:#ffffff22;color:#d4c8a0;">doa #3</div>
          <div class="big-emoji">⚖️</div>
          <div class="page-title" style="color:#f0e8cc;">Bismillah<br>jadi lawyer<br>anjayyyy!!</div>
          <div class="divider" style="background:#c8b888;"></div>
        `
                },
                right: {
                    bg: '#d4c4a0',
                    html: `
          <div class="page-italic" style="color:${BR2};font-size:0.85rem;">Menuju Chaza, S.pd., S.H. WKKWKWKWKW</div>
          <div class="divider" style="background:${BR};opacity:0.3;"></div>
        `
                }
            },
            {
                left: {
                    bg: BR2,
                    spine: '#2e1c0c',
                    html: `<img src="/birthday-cards/img2.jpg" style="width:150px;height:200px;object-fit:cover;margin-bottom:10px;border:3px solid rgba(255,255,255,0.4);">`
                },
                right: {
                    bg: '#d4c4a0',
                    
                }

            },



        ];

        let currentSpread = 0;
        const total = spreads.length;

        function applyContent(el, data) {
            el.style.background = data.bg;
            el.innerHTML = data.html || '';
        }

        function darken(hex) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            r = Math.max(0, r - 25);
            g = Math.max(0, g - 25);
            b = Math.max(0, b - 25);
            return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
        }

        function getSpineColor(spread) {
            return spread.left.spine || darken(spread.left.bg);
        }

        function renderStatic() {
            const sp = spreads[currentSpread];
            applyContent(document.getElementById('leftPanel'), sp.left);
            document.getElementById('spine').style.background = getSpineColor(sp);

            const p = document.getElementById('page0');
            if (currentSpread < total - 1) {
                p.style.display = 'block';
                p.style.pointerEvents = '';
                p.style.transition = 'none';
                p.classList.remove('flipped');
                applyContent(document.getElementById('p0f'), sp.right);
                applyContent(document.getElementById('p0b'), spreads[currentSpread + 1].left);
            } else {
                // Last spread: show right as static
                p.style.display = 'block';
                p.style.pointerEvents = 'none';
                p.style.transition = 'none';
                p.classList.remove('flipped');
                applyContent(document.getElementById('p0f'), sp.right);
            }
            updateControls();
        }

        function updateControls() {
            document.getElementById('prevBtn').disabled = currentSpread === 0;
            document.getElementById('nextBtn').disabled = currentSpread === total - 1;
            const labels = ['Cover', 'Halaman 1–2', 'Halaman 3–4', 'Halaman 5–6', 'Penutup'];
            document.getElementById('pageIndicator').textContent = labels[currentSpread] || '';
        }

        function goNext() {
            if (currentSpread >= total - 1) return;
            const p = document.getElementById('page0');
            p.style.display = 'block';
            p.style.pointerEvents = 'none';
            p.style.transition = 'none';
            p.classList.remove('flipped');
            applyContent(document.getElementById('p0f'), spreads[currentSpread].right);
            applyContent(document.getElementById('p0b'), spreads[currentSpread + 1].left);

            requestAnimationFrame(() => requestAnimationFrame(() => {
                p.style.transition = 'transform 0.78s cubic-bezier(0.645,0.045,0.355,1)';
                p.classList.add('flipped');

                setTimeout(() => {
                    currentSpread++;
                    const sp = spreads[currentSpread];
                    applyContent(document.getElementById('leftPanel'), sp.left);
                    document.getElementById('spine').style.background = getSpineColor(sp);

                    if (currentSpread < total - 1) {
                        p.style.transition = 'none';
                        p.classList.remove('flipped');
                        applyContent(document.getElementById('p0f'), sp.right);
                        applyContent(document.getElementById('p0b'), spreads[currentSpread + 1]
                            .left);
                        p.style.pointerEvents = '';
                    } else {
                        p.style.transition = 'none';
                        p.classList.remove('flipped');
                        applyContent(document.getElementById('p0f'), sp.right);
                        p.style.pointerEvents = 'none';
                    }
                    updateControls();
                }, 790);
            }));
        }

        function goPrev() {
            if (currentSpread <= 0) return;
            const p = document.getElementById('page0');
            applyContent(document.getElementById('p0f'), spreads[currentSpread - 1].right);
            applyContent(document.getElementById('p0b'), spreads[currentSpread].left);

            p.style.display = 'block';
            p.style.pointerEvents = 'none';
            p.style.transition = 'none';
            p.classList.add('flipped');

            const nextLeft = spreads[currentSpread].left;
            applyContent(document.getElementById('leftPanel'), nextLeft);
            document.getElementById('spine').style.background = getSpineColor(spreads[currentSpread]);

            requestAnimationFrame(() => requestAnimationFrame(() => {
                p.style.transition = 'transform 0.78s cubic-bezier(0.645,0.045,0.355,1)';
                p.classList.remove('flipped');

                setTimeout(() => {
                    currentSpread--;
                    const sp = spreads[currentSpread];
                    applyContent(document.getElementById('leftPanel'), sp.left);
                    document.getElementById('spine').style.background = getSpineColor(sp);
                    p.style.pointerEvents = '';
                    updateControls();
                }, 790);
            }));
        }

        document.getElementById('nextBtn').addEventListener('click', goNext);
        document.getElementById('prevBtn').addEventListener('click', goPrev);
        document.getElementById('page0').addEventListener('click', () => {
            if (currentSpread < total - 1) goNext();
        });

        renderStatic();
    })();
</script>
